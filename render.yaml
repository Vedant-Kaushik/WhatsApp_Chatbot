services:
  - type: web
    name: whatsapp-ai-bot
    env: docker
    dockerfilePath: Dockerfile.whatsapp
    region: singapore # Matches your Neon DB region (ap-southeast-1) for lowest latency
    plan: free
    healthCheckPath: /
    envVars:
      - key: PHONE_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: CALLBACK_URL
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DB_URI
        sync: false
